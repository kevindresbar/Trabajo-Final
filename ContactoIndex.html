<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomeOps</title>
    <link rel="stylesheet" href="Styles.css">
    <link rel="stylesheet" href="ContactoStyless.css">
</head>

<body>
    <header>
        <div class="Logo">
            <img class="MenuLogo" src="/Img/Logo.svg" alt="Logo">
        </div>

        <input type="checkbox" id="toggle__menu">
        <label for="toggle__menu">
            <img src="/Img/bar.svg" alt="" class="logo__menu">
        </label>

        <nav class="Menu">
            <ul class="MenuList">
                <li><a class="MenuList" href="IndexIniciol.html">INICIO</a></li>
                <li><a class="MenuList" href="">CONTÁCTANOS</a></li>
            </ul>
        </nav>


    </header>
    <main>
        <div class="Maestro">
            <img class="Maestro" src="https://i.pinimg.com/736x/e9/b0/fb/e9b0fb9cef148ed779e3d86467a952ce.jpg" alt="Mantenimiento">

        </div>


        <form class="contact_form" action="https://formspree.io/f/xpqyvdgg" method="POST">

            <fieldset>
                <h1 class="Titlecon">COTIZA CON NOSOTROS </h1>

                <label for="name">Nombre</label>
                <input type="text" placeholder="Tu nombre completo" id="name" name="name" required>

                <label for="number">Numero de Telefono</label>
                <input type="number" placeholder="Tu numero de Telefono" id="number" name="Number" required>

                <label for="Mail">Correo Eletronico</label>
                <input type="email" placeholder="**********@example.com" id="Mail" name="email" required>

                <label for="Servicio">Tipo de Servicio</label>
                <select class="List" name="Servicio" id="Servicio" required>
                    <option value="">Plomeria</option>
                    <option value="">Eletricista</option>
                    <option value="">Reparaciones</option>
                    <option value="">Instalaciones</option>
                    <option value="">Carpinteria</option>
                    <option value="">Jardineria</option>
                </select>

                <label for="message">Mensaje</label>
                <textarea class="textarea" name="" placeholder="¿En qué puedodemos ayudarte?" id="message" name="message" required></textarea>

                <!-- Se pone el requeride y el name en cada input para que se pueda enviar el formulario de lo contrario no dejara y saldra erro -->
                <button type="submit" class="btn">Solicitar Servicio</button>
            </fieldset>
        </form>


</main>

        <div class="Whatsapp">
            <a class="btnWhatsapp" href="https://api.whatsapp.com/send?phone=3023340961" target="_blank">
                <img class="btnWhatsapp" src="/Img/Whatsapp.png" alt="wasa"></a>
        </div>


    <footer>
        <div class="Abajo">
            <div class="footerlogo">
                <a> <img src="Img/Logo.svg" alt="Logo" class="fimg">
                </a>
            </div>

            <nav>
                <ul class="footerlegal">
                    <li><a class="ItemsLegal" href="/Docs/ReglasDeUso.pdf" download>Reglas Legales de Uso</a></li>
                    <li><a class="ItemsLegal" href="/Docs/TiemposDeRespuesta.pdf" download>Tiempos de Respuesta</a></li>
                    <li><a class="ItemsLegal" href="/Docs/ReglasGenerales.pdf" download>Reglamento General</a></li>
                    <li><a class="ItemsLegal" href="/Docs/DatosPersonales.pdf" download>Uso de datos personales</a></li>
                    <li><a class="ItemsLegal" href="/Docs/PoliticaDeGarantias.pdf" download>Política de Garantías</a>
                    </li>
                </ul>
            </nav>

        </div>

        <div class="MasAbajo">
            <p>HomeOps by Kevin Baez</p>
        </div>
    </footer>

</body>

</html>
